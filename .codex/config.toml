[features]
multi_agent = true

[agents]
max_threads = 8

[agents.default]
description = "General-purpose coding helper for this repo."
config_file = "default.toml"

[agents.worker]
description = "Implementation worker for coding and test execution."
config_file = "worker.toml"

[agents.explorer]
description = "Read-only codebase explorer for discovery tasks."
config_file = "explorer.toml"

[agents.orchestrator]
description = "Task orchestrator for sequencing and delegation."
config_file = "orchestrator.toml"

[agents.spec_writer]
description = "Specification writer and coordinator."
config_file = "spec-writer.toml"

[agents.spec_author]
description = "Specification author for initial drafting and revisions."
config_file = "spec-author.toml"

[agents.spec_reviewer]
description = "Coverage reviewer for specs."
config_file = "spec-reviewer.toml"

[agents.spec_proofreader]
description = "Text quality proofreader for specs."
config_file = "spec-proofreader.toml"

[agents.phase_creator]
description = "Creates phase documents from Implementation Order."
config_file = "phase-creator.toml"

[agents.phase_reviewer]
description = "Reviews phase documents against spec references."
config_file = "phase-reviewer.toml"

[agents.implementor]
description = "Implements stories and acceptance tests from specs."
config_file = "implementor.toml"

[agents.code_reviewer]
description = "Code reviewer focused on correctness and risk."
config_file = "code-reviewer.toml"

[agents.pr_reviewer]
description = "PR-level reviewer for branch-wide quality checks."
config_file = "pr-reviewer.toml"

[agents.frontend_designer]
description = "Frontend design specialist for UI changes."
config_file = "frontend-design.toml"
